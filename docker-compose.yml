services:
  user-api:
    container_name: user-api
    build: ./user-service
    ports:
      - "5001:5001"
    environment:
      - DB_HOST=user-db
    depends_on:
      - user-db

  user-db:
    image: mysql:8.0
    container_name: user-db
    environment:
      MYSQL_ROOT_PASSWORD: user_secret
      MYSQL_DATABASE: user_database

  product-api:
    container_name: product-api
    build: ./product-service
    ports:
      - "5002:5002"
    environment:
      - DB_HOST=product-db
    depends_on:
      - product-db

  product-db:
    image: mysql:8.0
    container_name: product-db
    environment:
      MYSQL_ROOT_PASSWORD: product_secret
      MYSQL_DATABASE: product_database